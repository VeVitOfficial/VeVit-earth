<!DOCTYPE html>
<html lang="cs" class="dark" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeVit Earth | Interaktivní 3D Globus</title>
    <meta name="description" content="Interaktivní 3D globus planety Země s živými daty z NASA EONET API. Sledujte požáry, bouře, zemětřesení a další přírodní události v reálném čase.">

    <!-- Google Fonts - Inter only -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        try {
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Inter', 'system-ui', 'sans-serif']
                        },
                        colors: {
                            brand: {
                                50: '#eff6ff',
                                100: '#dbeafe',
                                200: '#bfdbfe',
                                300: '#93c5fd',
                                400: '#60a5fa',
                                500: '#3b82f6',
                                600: '#2563eb',
                                700: '#1d4ed8',
                                800: '#1e40af',
                                900: '#1e3a8a',
                                950: '#172554'
                            },
                            surface: {
                                base: '#040d1a',
                                surface: '#0a1628',
                                elevated: '#0f1f35'
                            }
                        },
                        animation: {
                            'fade-in': 'fadeIn 150ms ease-out',
                            'slide-up': 'slideUp 200ms ease-out',
                            'slide-in-right': 'slideInRight 200ms ease-out',
                            'toast-in': 'toastIn 200ms ease-out',
                            'toast-out': 'toastOut 200ms ease-out forwards'
                        },
                        keyframes: {
                            fadeIn: {
                                '0%': { opacity: '0' },
                                '100%': { opacity: '1' }
                            },
                            slideUp: {
                                '0%': { opacity: '0', transform: 'translateY(8px)' },
                                '100%': { opacity: '1', transform: 'translateY(0)' }
                            },
                            slideInRight: {
                                '0%': { opacity: '0', transform: 'translateX(16px)' },
                                '100%': { opacity: '1', transform: 'translateX(0)' }
                            },
                            toastIn: {
                                '0%': { opacity: '0', transform: 'translateY(16px)' },
                                '100%': { opacity: '1', transform: 'translateY(0)' }
                            },
                            toastOut: {
                                '0%': { opacity: '1', transform: 'translateY(0)' },
                                '100%': { opacity: '0', transform: 'translateY(16px)' }
                            }
                        }
                    }
                }
            }
        } catch (e) { console.error("Tailwind config error", e); }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CesiumJS - MUST set BASE_URL before loading -->
    <script>
        // Set Cesium base URL BEFORE loading the library
        window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/';
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>

    <!-- Leaflet for Minimap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/globe.css">
</head>
<body class="bg-surface-base text-slate-200 overflow-hidden font-sans antialiased">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-surface-base">
        <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-6 relative">
                <svg class="w-full h-full animate-spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.2"/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="#3b82f6" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-xl font-semibold text-white mb-4 tracking-tight">VeVit Earth</h1>
            <div class="w-48 h-1.5 bg-surface-surface rounded-full overflow-hidden mb-3">
                <div id="loading-progress" class="h-full bg-brand-500 transition-all duration-300 rounded-full" style="width: 0%"></div>
            </div>
            <div class="flex items-center justify-center gap-2">
                <span id="loading-percent" class="text-sm font-medium text-brand-400 tabular-nums">0%</span>
                <span class="text-slate-600">·</span>
                <p id="loading-text" class="text-sm text-slate-500">Inicializace...</p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Main App Container -->
    <div id="app" class="hidden">

        <!-- TopBar -->
        <header id="topbar" class="fixed top-0 left-0 right-0 h-16 bg-surface-surface/95 backdrop-blur-lg border-b border-white/5 z-40 flex items-center px-4 gap-4">
            <!-- Logo -->
            <a href="https://vevit.fun" class="flex items-center gap-2.5 text-white hover:text-brand-400 transition-colors group">
                <div class="w-8 h-8 rounded-lg bg-brand-500/10 flex items-center justify-center">
                    <i data-lucide="globe" class="w-4 h-4 text-brand-400"></i>
                </div>
                <span class="font-semibold text-sm hidden sm:inline tracking-tight">VeVit Earth</span>
            </a>

            <!-- Search -->
            <div class="flex-1 max-w-md relative">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Hledat místo..."
                        class="w-full bg-surface-elevated border border-white/5 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500/50 focus:ring-1 focus:ring-brand-500/20 transition-all"
                        autocomplete="off"
                    >
                </div>
                <div id="search-results" class="absolute top-full left-0 right-0 mt-2 bg-surface-elevated border border-white/5 rounded-lg shadow-xl overflow-hidden hidden z-50"></div>
            </div>

            <!-- Event Badge -->
            <div id="event-badge" class="flex items-center gap-2 px-3 py-1.5 bg-surface-elevated rounded-lg border border-white/5">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                <span id="event-count" class="text-sm font-medium tabular-nums">0</span>
                <span class="text-xs text-slate-500 hidden sm:inline">událostí</span>
            </div>

            <!-- Back Link -->
            <a href="https://vevit.fun" class="hidden md:flex items-center gap-2 text-sm text-slate-500 hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>Zpět</span>
            </a>

            <!-- View Toggle -->
            <button id="view-toggle" class="flex items-center gap-2 px-3 py-1.5 bg-surface-elevated rounded-lg border border-white/5 hover:bg-white/5 transition-colors text-sm text-slate-400 hover:text-white">
                <i data-lucide="box" class="w-4 h-4"></i>
                <span id="view-mode">3D</span>
            </button>
        </header>

        <!-- Left Panel -->
        <aside id="left-panel" class="fixed top-16 left-0 bottom-0 w-80 bg-surface-surface/95 backdrop-blur-lg border-r border-white/5 z-30 flex flex-col transform transition-transform duration-200 lg:translate-x-0 -translate-x-full">

            <!-- Panel Toggle (Mobile) -->
            <button id="panel-toggle" class="lg:hidden absolute -right-10 top-4 w-8 h-8 bg-surface-surface border border-white/5 rounded-r-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/5 transition-colors">
                <i data-lucide="panel-left" class="w-4 h-4" id="panel-toggle-icon"></i>
            </button>

            <!-- Layers Section -->
            <section class="p-4 border-b border-white/5">
                <h2 class="text-xs font-medium text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="layers" class="w-3.5 h-3.5"></i> Vrstvy
                </h2>
                <div id="layer-controls" class="space-y-1">
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors group">
                        <input type="checkbox" id="layer-satellite" checked class="w-4 h-4 rounded border-slate-600 bg-surface-elevated text-brand-500 focus:ring-brand-500/20 focus:ring-offset-0">
                        <span class="text-sm text-slate-300 group-hover:text-white">Satelitní snímky</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors group">
                        <input type="checkbox" id="layer-terrain" class="w-4 h-4 rounded border-slate-600 bg-surface-elevated text-brand-500 focus:ring-brand-500/20 focus:ring-offset-0">
                        <span class="text-sm text-slate-300 group-hover:text-white">Terén</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors group">
                        <input type="checkbox" id="layer-borders" class="w-4 h-4 rounded border-slate-600 bg-surface-elevated text-brand-500 focus:ring-brand-500/20 focus:ring-offset-0">
                        <span class="text-sm text-slate-300 group-hover:text-white">Hranice států</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors group">
                        <input type="checkbox" id="layer-clouds" class="w-4 h-4 rounded border-slate-600 bg-surface-elevated text-brand-500 focus:ring-brand-500/20 focus:ring-offset-0">
                        <span class="text-sm text-slate-300 group-hover:text-white">Oblačnost</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors group">
                        <input type="checkbox" id="layer-nightlights" class="w-4 h-4 rounded border-slate-600 bg-surface-elevated text-brand-500 focus:ring-brand-500/20 focus:ring-offset-0">
                        <span class="text-sm text-slate-300 group-hover:text-white">Noční světla</span>
                    </label>
                </div>
            </section>

            <!-- EONET Events Section -->
            <section class="flex-1 flex flex-col overflow-hidden border-b border-white/5">
                <div class="p-4 border-b border-white/5">
                    <h2 class="text-xs font-medium text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i data-lucide="activity" class="w-3.5 h-3.5"></i> NASA EONET
                    </h2>

                    <!-- Time Filter -->
                    <div class="flex gap-1 mb-3">
                        <button data-days="7" class="time-filter flex-1 px-2 py-1.5 text-xs rounded-lg bg-surface-elevated border border-white/5 hover:bg-white/5 transition-colors text-slate-400 hover:text-white">7d</button>
                        <button data-days="30" class="time-filter flex-1 px-2 py-1.5 text-xs rounded-lg bg-brand-500/10 border border-brand-500/30 text-brand-400">30d</button>
                        <button data-days="90" class="time-filter flex-1 px-2 py-1.5 text-xs rounded-lg bg-surface-elevated border border-white/5 hover:bg-white/5 transition-colors text-slate-400 hover:text-white">90d</button>
                        <button data-days="all" class="time-filter flex-1 px-2 py-1.5 text-xs rounded-lg bg-surface-elevated border border-white/5 hover:bg-white/5 transition-colors text-slate-400 hover:text-white">Vše</button>
                    </div>

                    <!-- Category Filters -->
                    <div id="category-filters" class="flex flex-wrap gap-1">
                        <button data-category="wildfires" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 hover:border-red-500/30 transition-colors">
                            <i data-lucide="flame" class="w-3 h-3"></i> Požáry
                        </button>
                        <button data-category="severeStorms" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-purple-500/10 border border-purple-500/20 text-purple-400 hover:bg-purple-500/20 hover:border-purple-500/30 transition-colors">
                            <i data-lucide="cloud-lightning" class="w-3 h-3"></i> Bouře
                        </button>
                        <button data-category="volcanoes" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-orange-500/10 border border-orange-500/20 text-orange-400 hover:bg-orange-500/20 hover:border-orange-500/30 transition-colors">
                            <i data-lucide="mountain" class="w-3 h-3"></i> Sopky
                        </button>
                        <button data-category="earthquakes" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 hover:bg-yellow-500/20 hover:border-yellow-500/30 transition-colors">
                            <i data-lucide="activity" class="w-3 h-3"></i> Zemětřesení
                        </button>
                        <button data-category="floods" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 hover:bg-cyan-500/20 hover:border-cyan-500/30 transition-colors">
                            <i data-lucide="droplets" class="w-3 h-3"></i> Záplavy
                        </button>
                        <button data-category="seaLakeIce" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-sky-500/10 border border-sky-500/20 text-sky-300 hover:bg-sky-500/20 hover:border-sky-500/30 transition-colors">
                            <i data-lucide="snowflake" class="w-3 h-3"></i> Led
                        </button>
                        <button data-category="landslides" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-amber-600/10 border border-amber-600/20 text-amber-500 hover:bg-amber-600/20 hover:border-amber-600/30 transition-colors">
                            <i data-lucide="mountain-snow" class="w-3 h-3"></i> Sesuvy
                        </button>
                        <button data-category="snow" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-slate-400/10 border border-slate-400/20 text-slate-300 hover:bg-slate-400/20 hover:border-slate-400/30 transition-colors">
                            <i data-lucide="cloud-snow" class="w-3 h-3"></i> Sníh
                        </button>
                        <button data-category="dustHaze" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-amber-500/10 border border-amber-500/20 text-amber-400 hover:bg-amber-500/20 hover:border-amber-500/30 transition-colors">
                            <i data-lucide="wind" class="w-3 h-3"></i> Prach
                        </button>
                        <button data-category="drought" class="category-filter inline-flex items-center gap-1 px-2 py-1 text-xs rounded-md bg-lime-500/10 border border-lime-500/20 text-lime-400 hover:bg-lime-500/20 hover:border-lime-500/30 transition-colors">
                            <i data-lucide="sun" class="w-3 h-3"></i> Sucho
                        </button>
                    </div>
                </div>

                <!-- Event List -->
                <div id="event-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <!-- Loading State -->
                    <div id="event-list-loading" class="flex flex-col items-center justify-center py-12 text-center">
                        <div class="w-8 h-8 mb-3">
                            <svg class="w-full h-full animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-opacity="0.2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 2a10 10 0 0 1 10 10" stroke="#3b82f6" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <p class="text-sm text-slate-500">Načítání událostí...</p>
                    </div>
                </div>
            </section>

            <!-- Statistics Section - Bento Grid -->
            <section id="stats-section" class="p-4">
                <h2 class="text-xs font-medium text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> Statistiky
                </h2>

                <!-- Bento Grid -->
                <div class="grid grid-cols-2 gap-2">
                    <!-- Active Events - Large -->
                    <div class="col-span-2 bg-surface-elevated rounded-xl p-4 border border-white/5">
                        <div class="flex items-start justify-between">
                            <div>
                                <div class="text-xs text-slate-500 mb-1">Aktivních událostí</div>
                                <div id="stat-active" class="text-3xl font-semibold text-white tabular-nums">0</div>
                            </div>
                            <div class="w-10 h-10 rounded-lg bg-red-500/10 flex items-center justify-center">
                                <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Monthly Count -->
                    <div class="bg-surface-elevated rounded-xl p-3 border border-white/5">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-500"></i>
                            <span class="text-xs text-slate-500">Za 30 dní</span>
                        </div>
                        <div id="stat-month" class="text-xl font-semibold text-white tabular-nums">0</div>
                    </div>

                    <!-- Categories Count -->
                    <div class="bg-surface-elevated rounded-xl p-3 border border-white/5">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="tags" class="w-3.5 h-3.5 text-slate-500"></i>
                            <span class="text-xs text-slate-500">Kategorií</span>
                        </div>
                        <div id="stat-categories" class="text-xl font-semibold text-white tabular-nums">0</div>
                    </div>

                    <!-- Top Categories -->
                    <div class="col-span-2 bg-surface-elevated rounded-xl p-3 border border-white/5">
                        <div class="text-xs text-slate-500 mb-2">Nejaktivnější kategorie</div>
                        <div id="stat-top" class="flex flex-wrap gap-1.5">
                            <span class="text-xs text-slate-400">-</span>
                        </div>
                    </div>
                </div>

                <!-- Last Updated -->
                <div class="mt-3 flex items-center gap-2 text-xs text-slate-500">
                    <i data-lucide="clock" class="w-3 h-3"></i>
                    <span id="last-updated">Aktualizováno: -</span>
                </div>
            </section>
        </aside>

        <!-- Detail Panel (Right) -->
        <aside id="detail-panel" class="fixed top-16 right-0 bottom-0 w-96 bg-surface-surface/95 backdrop-blur-lg border-l border-white/5 z-30 transform translate-x-full transition-transform duration-200 overflow-y-auto">
            <div class="p-4">
                <!-- Close Button -->
                <button id="detail-close" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/5 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>

                <!-- Event Details -->
                <div id="detail-content">
                    <!-- Empty State -->
                    <div class="flex flex-col items-center justify-center py-16 text-center">
                        <div class="w-16 h-16 rounded-2xl bg-surface-elevated flex items-center justify-center mb-4">
                            <i data-lucide="mouse-pointer-click" class="w-8 h-8 text-slate-500"></i>
                        </div>
                        <p class="text-sm text-slate-500">Vyberte událost na mapě</p>
                        <p class="text-xs text-slate-600 mt-1">nebo v seznamu vlevo</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Cesium Globe Container -->
        <main id="cesium-container" class="fixed top-16 left-0 right-0 bottom-0 lg:left-80 transition-all duration-200">
            <!-- Cesium viewer will be injected here -->
        </main>

        <!-- HUD Overlay -->
        <div id="hud" class="fixed top-20 left-4 lg:left-84 z-20 pointer-events-none">
            <div class="bg-surface-surface/80 backdrop-blur-sm rounded-xl border border-white/5 p-3 text-xs space-y-2 min-w-[160px]">
                <div class="flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-500"></i>
                    <span id="hud-coords" class="text-slate-300 tabular-nums">0.00°N, 0.00°E</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="move-vertical" class="w-3.5 h-3.5 text-slate-500"></i>
                    <span id="hud-altitude" class="text-slate-300 tabular-nums">0 km</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-500"></i>
                    <span id="hud-time" class="text-slate-300">-</span>
                </div>
            </div>
        </div>

        <!-- Compass -->
        <div id="compass" class="fixed top-20 right-4 z-20 w-14 h-14 pointer-events-none">
            <svg viewBox="0 0 56 56" class="w-full h-full">
                <circle cx="28" cy="28" r="26" fill="rgba(10,22,40,0.8)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                <polygon id="compass-needle" points="28,8 24,28 32,28" fill="#ef4444" transform-origin="28 28"/>
                <text x="28" y="12" text-anchor="middle" fill="white" font-size="7" font-weight="600" class="select-none">N</text>
                <text x="28" y="50" text-anchor="middle" fill="#64748b" font-size="7" class="select-none">S</text>
                <text x="6" y="30" text-anchor="middle" fill="#64748b" font-size="7" class="select-none">W</text>
                <text x="50" y="30" text-anchor="middle" fill="#64748b" font-size="7" class="select-none">E</text>
            </svg>
        </div>

        <!-- Minimap -->
        <div id="minimap-container" class="fixed bottom-4 right-4 z-20 rounded-xl overflow-hidden border border-white/5 shadow-2xl hidden lg:block">
            <div id="minimap" class="w-48 h-28"></div>
            <div class="absolute bottom-1.5 right-1.5 text-xs text-slate-500 bg-black/40 px-1.5 py-0.5 rounded">
                <i data-lucide="map" class="w-3 h-3 inline"></i>
            </div>
        </div>

    </div>

    <!-- Scripts - order matters -->
    <script src="./assets/js/eonet-api.js"></script>
    <script src="./assets/js/cesium-globe.js"></script>
    <script src="./assets/js/ui-panels.js"></script>
    <script src="./assets/js/geocoding.js"></script>
    <script src="./assets/js/url-state.js"></script>
    <!-- App must load last -->
    <script src="./assets/js/app.js"></script>
</body>
</html>
